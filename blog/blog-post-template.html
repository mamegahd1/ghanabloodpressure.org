<!-- 
  BLOG POST TEMPLATE
  Copy this file, rename the folder, and update:
  1. Title, meta description, URL in canonical/OG tags
  2. Post date, title, and body content
  3. Add new entry to blog/index.html
  4. Add URL to sitemap.xml
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[POST TITLE] | GHSI Updates</title>
<meta name="description" content="[POST DESCRIPTION - 150-160 chars]">
<meta name="keywords" content="[RELEVANT KEYWORDS]">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://ghanabloodpressure.org/blog/[SLUG]/">
<meta property="og:type" content="article">
<meta property="og:url" content="https://ghanabloodpressure.org/blog/[SLUG]/">
<meta property="og:title" content="[POST TITLE] | GHSI">
<meta property="og:description" content="[SHORT DESCRIPTION]">
<meta property="og:site_name" content="Ghana Hypertension Screening Initiative">
<meta property="article:published_time" content="[YYYY-MM-DD]">
<meta property="article:author" content="Mavis Amegah-Dorr">
<meta property="twitter:card" content="summary">
<meta property="twitter:title" content="[POST TITLE]">
<meta property="twitter:description" content="[SHORT DESCRIPTION]">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "[POST TITLE]",
  "datePublished": "[YYYY-MM-DD]",
  "author": {
    "@type": "Person",
    "name": "Mavis Amegah-Dorr"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Ghana Hypertension Screening Initiative",
    "url": "https://ghanabloodpressure.org"
  },
  "description": "[POST DESCRIPTION]",
  "mainEntityOfPage": "https://ghanabloodpressure.org/blog/[SLUG]/"
}
</script>
<!-- PASTE SAME CSS AS blog/index.html -->
</head>
<body>
<!-- PASTE SAME NAV AS blog/index.html -->
<main>
  <p class="post-date">[MONTH YEAR]</p>
  <h1>[POST TITLE]</h1>
  <!-- BODY CONTENT HERE -->
</main>
<!-- PASTE SAME FOOTER AS blog/index.html -->
</body>
</html>
